name: Dashboard ECharts Rendering Tests

# Runs the dashboard rendering test suites (unit + integration) on every PR.
# These tests exercise the exact FastAPI+Panel app the container serves and
# verify the Apache ECharts dashboard renders correctly *without* requiring
# Docker, a live Zenoh/IoTDB stack, or a browser.

on:
  push:
    branches: [ main, feature/*, develop ]
  pull_request:
    branches: [ main ]

jobs:
  dashboard-rendering:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        # UI / dashboard rendering deps
        pip install "panel>=1.4.0" "bokeh-fastapi>=0.1.8" pytest pytest-asyncio httpx

    - name: Run dashboard unit + integration tests
      run: |
        python -m pytest tests/test_dashboard_echarts.py tests/test_dashboard_integration.py -v --tb=short

    - name: Run full suite (service-dependent tests auto-skip)
      run: |
        python -m pytest tests/ -v --tb=short
