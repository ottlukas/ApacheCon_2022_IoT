version: '3.9'

services:
  zenohd:
    image: eclipse/zenoh
    container_name: zenohd
    ports:
      - "7447:7447/tcp"  # Zenoh protocol TCP
      - "8000:8000/tcp"  # Zenoh REST API (optional, for direct testing)
    restart: unless-stopped
    environment:
      - RUST_LOG=info # Set Zenoh logging level
    healthcheck: # Added a simple healthcheck for zenohd
      test: ["CMD", "nc", "-z", "localhost", "7447"]
      interval: 10s
      timeout: 5s
      retries: 5

  iotdb:
    image: apache/iotdb:1.3.2-standalone # Using a specific stable version
    container_name: iotdb
    ports:
      - "6667:6667"  # IoTDB Thrift service
      - "8181:8181"  # IoTDB HTTP service (if applicable)
    restart: unless-stopped
    environment:
      - JVM_XMS=512M # Adjust JVM heap size as needed
      - JVM_XMX=1G
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'show timeseries' | /iotdb/sbin/start-cli.sh -h 127.0.0.1 -p 6667 -u root -pw root"]
      interval: 10s
      timeout: 5s
      retries: 5

  panel:
    build:
      context: .
      dockerfile: Dockerfile.panel
    container_name: panel
    depends_on:
      zenohd:
        condition: service_healthy # Changed from service_started to service_healthy
      iotdb:
        condition: service_healthy
    environment:
      # These variables configure your Panel service to connect to the Docker services
      - ZENOH_ROUTER_ENDPOINT=tcp://zenohd:7447
      - IOTDB_HOST=iotdb
      - IOTDB_PORT=6667
    # If your panel service needs to expose a web interface, add ports here:
    # ports:
    #   - "8080:8080" # Example: if your Panel serves a web UI
